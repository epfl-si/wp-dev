groups:
  - name: menu-api - Refresh Files less than 3
    rules:
      # Alert if there are less than 3 refresh files (menuEN, menuDE and menuFR).
      - alert: RefreshFileCountAlert
        expr: sum by(job) (menu_api_total_refresh_files) < 3
        for: 10s
        labels:
          severity: page
          sendto: telegram
          app: menu-api
        annotations:
          summary: Refresh Files less than 3
          description: "Only the following files exist:\n 
            {{ range query \"menu_api_total_refresh_files\" }}
              {{ .Labels.fileName }} {{ .Value }} \n
            {{ end }}"

  - name: menu-api - Total WP-Veritas sites less than 690
    rules:
      # Alert if there are less than 690 sites recovered from https://wp-veritas.epfl.ch/.
      - alert: TotalWPVeritasSites
        expr: menu_api_total_WPV_sites < 690
        for: 10s
        labels:
          severity: page
          sendto: telegram
          app: menu-api
        annotations:
          summary: Total WP-Veritas sites less than 690
          description: "
            {{ range query \"menu_api_total_WPV_sites\" }}
              {{ .Value }} \n
            {{ end }} retrieved sites from https://wp-veritas.epfl.ch/. The total should be ~690 sites."

  - name: menu-api - External detached menus found
    rules:
      # Alert if some external menu doesn't exist in the recovered menus from https://wp-veritas.epfl.ch/ in the correct openshift environment.
      - alert: TotalExternalDetachedMenus
        expr: count(menu_api_error_count{message="External detached menu found", url!="undefined"}) > 0
        for: 10s
        labels:
          severity: page
          sendto: telegram
          app: menu-api
        annotations:
          summary: External detached menus found
          description: "Here the list of the external menus:
            {{ range query \"menu_api_error_count{message='External detached menu found', url!='undefined'}\" }}
              {{ .Labels.url }} \n
            {{ end }} "
